<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style= "background-color: black; color: white; text-align: center;">
    <div>
        <h1>Love Calculator</h1>
        <form>
            <label for="Boy" required>Boy's Name:</label>
            <input type="text" id="Boy" name="Boy" required>
            <br>
            <br>
            <label for="Girl" required>Girl's Name:</label>
            <input type="text" id="Girl" name="Girl" required>
            <br>
            <br>
            <button type="submit">Calculate Love <br></button>
        </form>
        <h2 id="result"> <br>Result</h2>
    </div>
    <script src="script.js"></script>
</body>
</html>
