<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Remover</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f5f5;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        #gallery{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:10px;
            cursor:pointer;
            transition:.3s;
        }

        img:hover{
            transform:scale(1.05);
        }
    </style>

</head>
<body>

    <h1>Click Any Image to Remove</h1>

    <div id="gallery"></div>

    <script src="script.js"></script>

</body>
</html>
